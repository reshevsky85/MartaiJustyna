<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rejestracja Aut</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23e69500'/%3E%3Cpath d='M12 38 L16 26 Q17 23 20 23 L44 23 Q47 23 48 26 L52 38' stroke='white' stroke-width='2.5' fill='none' stroke-linejoin='round'/%3E%3Crect x='10' y='37' width='44' height='13' rx='5' fill='white'/%3E%3Ccircle cx='20' cy='50' r='5.5' fill='%23e69500' stroke='white' stroke-width='2'/%3E%3Ccircle cx='44' cy='50' r='5.5' fill='%23e69500' stroke='white' stroke-width='2'/%3E%3Crect x='24' y='28' width='16' height='8' rx='2' fill='%23e69500' opacity='0.35'/%3E%3Ccircle cx='20' cy='50' r='2' fill='white'/%3E%3Ccircle cx='44' cy='50' r='2' fill='white'/%3E%3Crect x='10' y='37' width='8' height='6' rx='2' fill='%23fbbf24' opacity='0.5'/%3E%3Crect x='46' y='37' width='8' height='6' rx='2' fill='%23fbbf24' opacity='0.5'/%3E%3C/svg%3E" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f2f7;
    --surface: #ffffff;
    --surface2: #f7f8fc;
    --border: #dde1ec;
    --accent: #e69500;
    --accent2: #3b82f6;
    --text: #1a1d2e;
    --muted: #8890a8;
    --danger: #ef4444;
    --success: #16a34a;
    --success-bg: #dcfce7;
    --danger-bg: #fee2e2;
    --exited-color: #64748b;
    --exited-bg: #f1f5f9;
    --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.06);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 28px 24px;
  }

  /* ─── HEADER ─── */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 2px 8px rgba(230,149,0,0.3);
    flex-shrink: 0;
  }

  .logo h1 {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .logo h1 span { color: var(--accent); }

  /* ─── STATS BAR ─── */
  .stats-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: flex-start;
  }

  .stat {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 9px 16px;
    text-align: center;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: border-color 0.18s, box-shadow 0.18s, transform 0.12s;
    user-select: none;
    position: relative;
  }

  .stat:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(230,149,0,0.15); }
  .stat.active { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(230,149,0,0.18); }

  .stat-num {
    font-size: 1.3rem;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .stat-label {
    font-size: 0.64rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
    white-space: nowrap;
  }

  .stat-avg { cursor: default; }
  .stat-avg:hover { transform: none; box-shadow: var(--shadow); border-color: var(--border); }

  /* ─── TOP CONTROLS ─── */
  .top-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px 10px 40px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
    box-shadow: var(--shadow);
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  .btn-export {
    display: flex; align-items: center; gap: 7px;
    background: var(--surface);
    color: var(--success);
    border: 1.5px solid #86efac;
    border-radius: 10px;
    padding: 10px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, transform 0.1s;
    white-space: nowrap;
    box-shadow: var(--shadow);
  }

  .btn-export:hover { background: var(--success); color: #fff; border-color: var(--success); }
  .btn-export:active { transform: scale(0.97); }

  .btn-delete-all {
    display: flex; align-items: center; gap: 7px;
    background: var(--surface);
    color: var(--danger);
    border: 1.5px solid #fca5a5;
    border-radius: 10px;
    padding: 10px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, transform 0.1s;
    white-space: nowrap;
    box-shadow: var(--shadow);
  }

  .btn-delete-all:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
  .btn-delete-all:active { transform: scale(0.97); }

  /* ─── ADD ROW ─── */
  .add-row {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 16px;
    width: fit-content;
  }

  /* autocomplete wrapper */
  .autocomplete-wrap {
    position: relative;
  }

  .add-row input#inline-plate {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-right: none;
    border-radius: 10px 0 0 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
    width: 210px;
    text-transform: uppercase;
    box-shadow: var(--shadow);
    letter-spacing: 0.04em;
  }

  .add-row input#inline-plate:focus { border-color: var(--accent); }
  .add-row input#inline-plate::placeholder { color: var(--muted); text-transform: none; font-weight: 400; font-family: 'Syne', sans-serif; font-size: 0.82rem; letter-spacing: 0; }

  .suggestions-dropdown {
    position: absolute;
    top: calc(100% + 2px);
    left: 0;
    width: 210px;
    background: var(--surface);
    border: 1.5px solid var(--accent);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 200;
    overflow: hidden;
    display: none;
  }

  .suggestions-dropdown.open { display: block; }

  .suggestion-item {
    padding: 9px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: background 0.12s;
    letter-spacing: 0.04em;
  }

  .suggestion-item:hover, .suggestion-item.highlighted { background: #fff7e6; color: var(--accent); }

  .btn-add {
    display: flex; align-items: center; gap: 7px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 0 10px 10px 0;
    padding: 10px 20px;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(230,149,0,0.25);
    height: 100%;
  }

  .btn-add:hover { opacity: 0.88; }
  .btn-add:active { transform: scale(0.97); }

  /* ─── TABLE ─── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    overflow-x: auto;
    box-shadow: var(--shadow);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.87rem;
  }

  thead tr {
    background: var(--surface2);
    border-bottom: 2px solid var(--border);
  }

  th {
    padding: 12px 14px;
    text-align: left;
    font-size: 0.66rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    white-space: nowrap;
  }

  th:first-child { color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }

  tbody tr:last-child { border-bottom: none; }

  tbody tr:hover:not(.soft-deleted) { background: #eef2ff; }

  tbody tr.hidden { display: none; }

  /* Soft deleted rows */
  tbody tr.soft-deleted td { opacity: 0.45; }
  tbody tr.soft-deleted .td-plate { text-decoration: line-through; color: var(--muted); }
  tbody tr.soft-deleted:hover { background: #fef2f2 !important; }

  td {
    padding: 12px 14px;
    vertical-align: middle;
  }

  .td-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 600;
    width: 46px;
  }

  .td-plate {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.96rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .td-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.81rem;
    color: #475569;
    white-space: nowrap;
  }

  .td-exit { min-width: 130px; }
  .td-docnr { min-width: 150px; }

  /* ─── EXIT + DOC INLINE EDIT ─── */
  .cell-display {
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
  }

  .cell-display .cell-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.81rem;
    color: #475569;
  }

  .cell-display .cell-val.empty {
    color: #b0baca;
    font-style: italic;
    font-size: 0.74rem;
    font-family: 'Syne', sans-serif;
  }

  .cell-edit-icon {
    opacity: 0;
    color: var(--accent2);
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  tbody tr:hover .cell-edit-icon { opacity: 1; }
  tbody tr.soft-deleted .cell-edit-icon { display: none; }
  tbody tr.soft-deleted .cell-display { cursor: default; }

  .cell-edit {
    display: none;
    align-items: center;
    gap: 5px;
  }

  .cell-edit input {
    background: #f8fafc;
    border: 1px solid var(--accent2);
    border-radius: 8px;
    padding: 5px 9px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    outline: none;
    width: 90px;
  }

  .cell-edit input.doc-input { width: 130px; }

  .btn-save-cell, .btn-cancel-cell {
    border: none;
    border-radius: 6px;
    padding: 5px 9px;
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
  }

  .btn-save-cell { background: var(--success); color: #fff; }
  .btn-cancel-cell { background: #e2e8f0; color: var(--muted); }

  /* ─── DELETE BTN ─── */
  .btn-del {
    background: none;
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 5px 8px;
    color: #cbd5e1;
    cursor: pointer;
    font-size: 0.82rem;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    opacity: 0;
    white-space: nowrap;
  }

  tbody tr:hover .btn-del { opacity: 1; }
  .btn-del:hover { color: var(--danger); border-color: #fca5a5; background: #fff1f1; }
  tbody tr.soft-deleted .btn-del { color: var(--success); border-color: #86efac; opacity: 1; }
  tbody tr.soft-deleted .btn-del:hover { background: #f0fdf4; }

  /* ─── STATUS BADGES ─── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .badge-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Inside - pulsing with glow */
  .badge-ok { background: var(--success-bg); color: var(--success); }
  .badge-ok .badge-dot {
    background: var(--success);
    animation: pulse-glow 2s ease-in-out infinite;
    box-shadow: 0 0 0 0 rgba(22,163,74,0.5);
  }

  @keyframes pulse-glow {
    0%   { opacity: 1; box-shadow: 0 0 0 0 rgba(22,163,74,0.55); }
    50%  { opacity: 0.6; box-shadow: 0 0 0 5px rgba(22,163,74,0); }
    100% { opacity: 1; box-shadow: 0 0 0 0 rgba(22,163,74,0); }
  }

  .badge-over { background: var(--danger-bg); color: var(--danger); }
  .badge-over .badge-dot { background: var(--danger); animation: pulse-danger 1.3s ease-in-out infinite; }

  @keyframes pulse-danger {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  .badge-out  { background: var(--exited-bg); color: var(--exited-color); }
  .badge-out  .badge-dot { background: #94a3b8; }

  .badge-deleted { background: #fef2f2; color: #f87171; text-decoration: line-through; }
  .badge-deleted .badge-dot { background: #f87171; }

  /* ─── MODAL (doc nr prompt) ─── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(15,18,30,0.42);
    backdrop-filter: blur(3px);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 30px 28px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    animation: pop 0.2s ease;
  }

  @keyframes pop {
    from { transform: scale(0.94); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  .modal h2 {
    font-size: 1.1rem;
    font-weight: 800;
    margin-bottom: 6px;
    color: var(--text);
  }

  .modal h2 span { color: var(--accent); }

  .modal p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .modal .field label {
    display: block;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 7px;
  }

  .modal .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 18px;
  }

  .modal .field input:focus { border-color: var(--accent); background: #fff; }
  .modal .field input::placeholder { color: #b0b8ce; }

  .modal-actions {
    display: flex;
    gap: 10px;
  }

  .btn-confirm {
    flex: 1;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-confirm:hover { opacity: 0.88; }

  .btn-skip {
    background: #f1f3f9;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-skip:hover { background: #e4e8f2; }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center;
    padding: 56px 20px;
    color: var(--muted);
  }

  .empty-state .big-icon { font-size: 2.8rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.88rem; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">🚗</div>
    <h1>Rejestracja <span>Aut</span></h1>
  </div>
  <div class="stats-bar">
    <div class="stat" id="stat-all-box" title="Pokaż wszystkie">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Wszystkich</div>
    </div>
    <div class="stat" id="stat-inside-box" title="Filtruj: W środku" style="border-color:#bbf7d0">
      <div class="stat-num" id="stat-inside" style="color:#16a34a">0</div>
      <div class="stat-label">W środku</div>
    </div>
    <div class="stat" id="stat-over-box" title="Filtruj: Powyżej 2h" style="border-color:#fca5a5">
      <div class="stat-num" id="stat-over" style="color:#ef4444">0</div>
      <div class="stat-label">Powyżej 2h</div>
    </div>
    <div class="stat" id="stat-exited-box" title="Filtruj: Na zewnątrz">
      <div class="stat-num" id="stat-exited" style="color:#64748b">0</div>
      <div class="stat-label">Na zewnątrz</div>
    </div>
    <div class="stat stat-avg" id="stat-avg-box" title="Średni czas pobytu aktywnych aut">
      <div class="stat-num" id="stat-avg" style="color:#7c3aed">—</div>
      <div class="stat-label">Śr. czas</div>
    </div>
  </div>
</div>

<!-- TOP CONTROLS -->
<div class="top-controls">
  <div class="search-wrap">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search-input" placeholder="Filtruj po numerze auta…" />
  </div>
  <button class="btn-export" id="export-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="12" y1="18" x2="12" y2="12"/>
      <polyline points="9 15 12 18 15 15"/>
    </svg>
    Eksport Excel
  </button>
  <button class="btn-delete-all" id="delete-all-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
    </svg>
    Usuń wszystko
  </button>
</div>

<!-- ADD ROW -->
<div class="add-row">
  <div class="autocomplete-wrap">
    <input type="text" id="inline-plate" placeholder="Nr rejestracyjny…" maxlength="15" autocomplete="off" />
    <div class="suggestions-dropdown" id="suggestions-dropdown"></div>
  </div>
  <button class="btn-add" id="inline-add-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Dodaj
  </button>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Numer Rejestracyjny</th>
        <th>Nr Dokumentu</th>
        <th>Czas Przyjazdu</th>
        <th>Czas Wyjazdu</th>
        <th>Status</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="table-body">
      <tr>
        <td colspan="7">
          <div class="empty-state">
            <div class="big-icon">🚧</div>
            <p>Brak wpisów — wpisz numer rejestracyjny i kliknij <strong>Dodaj</strong></p>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- MODAL: Pytanie o nr dokumentu -->
<div class="modal-overlay" id="doc-modal">
  <div class="modal">
    <h2>Nr Dokumentu dla <span id="modal-plate-label">—</span></h2>
    <p>Czy chcesz dodać numer dokumentu dla tego pojazdu?</p>
    <div class="field">
      <label>Numer dokumentu (opcjonalnie)</label>
      <input type="text" id="modal-doc-input" placeholder="np. WZ/2024/001" />
    </div>
    <div class="modal-actions">
      <button class="btn-skip" id="modal-skip-btn">Pomiń</button>
      <button class="btn-confirm" id="modal-confirm-btn">Zapisz i dodaj</button>
    </div>
  </div>
</div>

<!-- SheetJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import {
    getDatabase, ref, push, set, remove, onValue
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://leads-trucker-app-default-rtdb.europe-west1.firebasedatabase.app/"
  };

  const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const trackerRef = ref(db, "plateTracker");

  // ── Helpers ──
  function fmtDate(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    const pad = n => String(n).padStart(2, "0");
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }

  function fmtTime(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    const pad = n => String(n).padStart(2, "0");
    return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function fmtDateTime(iso) {
    if (!iso) return "";
    return `${fmtDate(iso)} ${fmtTime(iso)}`;
  }

  function nowIso() { return new Date().toISOString(); }

  function minutesInside(arrivalIso) {
    return (Date.now() - new Date(arrivalIso).getTime()) / 60000;
  }

  function statusBadge(e) {
    if (e.softDeleted) {
      return `<span class="badge badge-deleted"><span class="badge-dot"></span>Usunięte</span>`;
    }
    if (e.exit) {
      return `<span class="badge badge-out"><span class="badge-dot"></span>Na zewnątrz</span>`;
    }
    if (minutesInside(e.arrival) > 120) {
      return `<span class="badge badge-over"><span class="badge-dot"></span>Powyżej 2h</span>`;
    }
    return `<span class="badge badge-ok"><span class="badge-dot"></span>W środku</span>`;
  }

  // ── State ──
  let entries = {};
  let activeFilter = 'all'; // 'all' | 'inside' | 'over2h' | 'exited'

  // ── Stat box filter click ──
  const filterMap = {
    'stat-all-box':    'all',
    'stat-inside-box': 'inside',
    'stat-over-box':   'over2h',
    'stat-exited-box': 'exited',
  };

  Object.keys(filterMap).forEach(id => {
    document.getElementById(id).addEventListener("click", () => {
      activeFilter = filterMap[id];
      // Update active state
      document.querySelectorAll('.stat').forEach(s => s.classList.remove('active'));
      if (activeFilter !== 'all') document.getElementById(id).classList.add('active');
      render();
    });
  });

  // ── Render ──
  function render() {
    const tbody  = document.getElementById("table-body");
    const search = document.getElementById("search-input").value.toLowerCase();
    const keys   = Object.keys(entries);

    if (keys.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="big-icon">🚧</div><p>Brak wpisów — wpisz numer rejestracyjny i kliknij <strong>Dodaj</strong></p></div></td></tr>`;
      updateStats();
      return;
    }

    tbody.innerHTML = "";
    let rowNum = 0;

    keys.forEach(key => {
      const e = entries[key];
      rowNum++;

      // Search filter
      const matchesSearch = !search || e.plate.toLowerCase().includes(search) || (e.docNr || '').toLowerCase().includes(search);

      // Stat filter (don't filter out soft-deleted — show them always if "all")
      let matchesFilter = true;
      if (!e.softDeleted) {
        if (activeFilter === 'inside') {
          matchesFilter = !e.exit && minutesInside(e.arrival) <= 120;
        } else if (activeFilter === 'over2h') {
          matchesFilter = !e.exit && minutesInside(e.arrival) > 120;
        } else if (activeFilter === 'exited') {
          matchesFilter = !!e.exit;
        }
      } else {
        // soft deleted rows: only show in 'all'
        matchesFilter = (activeFilter === 'all');
      }

      const visible = matchesSearch && matchesFilter;
      const hasExit = !!e.exit;
      const isDeleted = !!e.softDeleted;

      const tr = document.createElement("tr");
      tr.dataset.key = key;
      if (!visible) tr.classList.add("hidden");
      if (isDeleted) tr.classList.add("soft-deleted");

      tr.innerHTML = `
        <td class="td-num">${rowNum}</td>
        <td class="td-plate">${e.plate}</td>
        <td class="td-docnr">
          <div class="cell-display" data-field="docNr">
            <span class="cell-val ${e.docNr ? '' : 'empty'}">${e.docNr || '— dodaj —'}</span>
            <svg class="cell-edit-icon" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5l3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </div>
          <div class="cell-edit" data-field="docNr">
            <input type="text" class="doc-input" placeholder="Nr dokumentu" value="${e.docNr || ''}" />
            <button class="btn-save-cell">✓</button>
            <button class="btn-cancel-cell">✕</button>
          </div>
        </td>
        <td class="td-time">${fmtDateTime(e.arrival)}</td>
        <td class="td-exit">
          <div class="cell-display" data-field="exit">
            <span class="cell-val ${hasExit ? '' : 'empty'}">${hasExit ? e.exit : '— ustaw —'}</span>
            <svg class="cell-edit-icon" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5l3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </div>
          <div class="cell-edit" data-field="exit">
            <input type="time" value="${hasExit ? e.exit : fmtTime(nowIso())}" />
            <button class="btn-save-cell">✓</button>
            <button class="btn-cancel-cell">✕</button>
          </div>
        </td>
        <td>${statusBadge(e)}</td>
        <td>
          <button class="btn-del" title="${isDeleted ? 'Przywróć' : 'Przekreśl wiersz'}">
            ${isDeleted ? '↩ Przywróć' : '🗑 Usuń'}
          </button>
        </td>
      `;

      // ── Inline edit handlers (docNr and exit) ──
      ['docNr', 'exit'].forEach(field => {
        const display   = tr.querySelector(`.cell-display[data-field="${field}"]`);
        const editRow   = tr.querySelector(`.cell-edit[data-field="${field}"]`);
        const input     = editRow.querySelector('input');
        const saveBtn   = editRow.querySelector('.btn-save-cell');
        const cancelBtn = editRow.querySelector('.btn-cancel-cell');

        if (isDeleted) return; // no editing on soft-deleted

        display.addEventListener("click", () => {
          // For exit time: auto-fill current time
          if (field === 'exit') {
            input.value = fmtTime(nowIso());
          }
          display.style.display = "none";
          editRow.style.display = "flex";
          input.focus();
        });

        cancelBtn.addEventListener("click", () => {
          editRow.style.display = "none";
          display.style.display = "flex";
        });

        saveBtn.addEventListener("click", () => {
          const val = input.value.trim() || null;
          set(ref(db, `plateTracker/${key}/${field}`), val);
        });

        input.addEventListener("keydown", ev => {
          if (ev.key === "Enter") saveBtn.click();
          if (ev.key === "Escape") cancelBtn.click();
        });
      });

      // ── Soft delete / restore ──
      tr.querySelector(".btn-del").addEventListener("click", () => {
        if (isDeleted) {
          // Restore
          set(ref(db, `plateTracker/${key}/softDeleted`), null);
        } else {
          // Soft delete (cross out)
          set(ref(db, `plateTracker/${key}/softDeleted`), true);
        }
      });

      tbody.appendChild(tr);
    });

    updateStats();
  }

  function updateStats() {
    const keys = Object.keys(entries);
    const active = keys.filter(k => !entries[k].softDeleted);
    const total  = active.length;
    const exited = active.filter(k => !!entries[k].exit).length;
    const over   = active.filter(k => !entries[k].exit && minutesInside(entries[k].arrival) > 120).length;
    const inside = total - exited;

    document.getElementById("stat-total").textContent  = total;
    document.getElementById("stat-inside").textContent = inside;
    document.getElementById("stat-over").textContent   = over;
    document.getElementById("stat-exited").textContent = exited;

    // Average time inside (only non-exited, non-deleted)
    const activeInside = active.filter(k => !entries[k].exit);
    if (activeInside.length > 0) {
      const avgMins = activeInside.reduce((sum, k) => sum + minutesInside(entries[k].arrival), 0) / activeInside.length;
      const h = Math.floor(avgMins / 60);
      const m = Math.floor(avgMins % 60);
      document.getElementById("stat-avg").textContent = h > 0 ? `${h}g ${m}min` : `${m} min`;
    } else {
      document.getElementById("stat-avg").textContent = "—";
    }
  }

  // ── Firebase listener ──
  onValue(trackerRef, snap => {
    entries = snap.exists() ? snap.val() : {};
    render();
    updateSuggestions();
  });

  // Auto-refresh every 60s
  setInterval(() => { render(); }, 60000);

  // ── Search ──
  document.getElementById("search-input").addEventListener("input", render);

  // ── Autocomplete suggestions ──
  const inlinePlate  = document.getElementById("inline-plate");
  const dropdown     = document.getElementById("suggestions-dropdown");
  let suggHighlight  = -1;

  function updateSuggestions() {
    // Collect unique plates from existing entries
    window._knownPlates = [...new Set(Object.values(entries).map(e => e.plate))].sort();
  }

  inlinePlate.addEventListener("input", () => {
    inlinePlate.value = inlinePlate.value.toUpperCase();
    const q = inlinePlate.value.trim();
    if (!q || q.length < 1) { dropdown.classList.remove("open"); return; }

    const matches = (window._knownPlates || []).filter(p => p.startsWith(q) && p !== q);
    if (matches.length === 0) { dropdown.classList.remove("open"); return; }

    dropdown.innerHTML = matches.slice(0, 6).map((p, i) =>
      `<div class="suggestion-item" data-idx="${i}">${p}</div>`
    ).join("");
    dropdown.classList.add("open");
    suggHighlight = -1;

    dropdown.querySelectorAll('.suggestion-item').forEach(item => {
      item.addEventListener("click", () => {
        inlinePlate.value = item.textContent;
        dropdown.classList.remove("open");
        inlinePlate.focus();
      });
    });
  });

  inlinePlate.addEventListener("keydown", e => {
    const items = dropdown.querySelectorAll('.suggestion-item');
    if (dropdown.classList.contains("open") && items.length > 0) {
      if (e.key === "ArrowDown") {
        e.preventDefault();
        suggHighlight = Math.min(suggHighlight + 1, items.length - 1);
        items.forEach((it, i) => it.classList.toggle("highlighted", i === suggHighlight));
        return;
      }
      if (e.key === "ArrowUp") {
        e.preventDefault();
        suggHighlight = Math.max(suggHighlight - 1, 0);
        items.forEach((it, i) => it.classList.toggle("highlighted", i === suggHighlight));
        return;
      }
      if (e.key === "Tab" || (e.key === "Enter" && suggHighlight >= 0)) {
        e.preventDefault();
        inlinePlate.value = items[suggHighlight >= 0 ? suggHighlight : 0].textContent;
        dropdown.classList.remove("open");
        return;
      }
    }
    if (e.key === "Escape") { dropdown.classList.remove("open"); return; }
    if (e.key === "Enter") doAdd();
  });

  document.addEventListener("click", e => {
    if (!e.target.closest(".autocomplete-wrap")) dropdown.classList.remove("open");
  });

  // ── Add entry logic (with doc modal) ──
  let pendingPlate = null;

  function doAdd() {
    const plate = inlinePlate.value.trim().toUpperCase();
    if (!plate) { inlinePlate.style.borderColor = "#ef4444"; inlinePlate.focus(); return; }
    inlinePlate.style.borderColor = "";
    dropdown.classList.remove("open");
    pendingPlate = plate;
    // Show doc modal
    document.getElementById("modal-plate-label").textContent = plate;
    document.getElementById("modal-doc-input").value = "";
    document.getElementById("doc-modal").classList.add("active");
    setTimeout(() => document.getElementById("modal-doc-input").focus(), 80);
  }

  document.getElementById("inline-add-btn").addEventListener("click", doAdd);

  function commitAdd(docNr) {
    push(trackerRef, {
      plate:   pendingPlate,
      arrival: nowIso(),
      exit:    null,
      docNr:   docNr || null
    });
    inlinePlate.value = "";
    pendingPlate = null;
    document.getElementById("doc-modal").classList.remove("active");
    inlinePlate.focus();
  }

  document.getElementById("modal-confirm-btn").addEventListener("click", () => {
    const docNr = document.getElementById("modal-doc-input").value.trim();
    commitAdd(docNr);
  });

  document.getElementById("modal-skip-btn").addEventListener("click", () => {
    commitAdd(null);
  });

  document.getElementById("modal-doc-input").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("modal-confirm-btn").click();
    if (e.key === "Escape") document.getElementById("modal-skip-btn").click();
  });

  document.getElementById("doc-modal").addEventListener("click", e => {
    if (e.target === document.getElementById("doc-modal")) document.getElementById("modal-skip-btn").click();
  });

  // ── Delete All ──
  document.getElementById("delete-all-btn").addEventListener("click", () => {
    const activeKeys = Object.keys(entries).filter(k => !entries[k].softDeleted);
    if (activeKeys.length === 0) { alert("Brak wpisów do usunięcia."); return; }
    if (confirm(`Czy na pewno chcesz usunąć wszystkie ${activeKeys.length} wpis(y)? Tej operacji nie można cofnąć.`)) {
      remove(trackerRef);
    }
  });

  // ── Export Excel ──
  document.getElementById("export-btn").addEventListener("click", () => {
    const keys = Object.keys(entries).filter(k => !entries[k].softDeleted);
    if (keys.length === 0) { alert("Brak danych do eksportu."); return; }

    const rows = keys.map((key, i) => {
      const e    = entries[key];
      const mins = minutesInside(e.arrival);
      const status = e.exit ? "Na zewnątrz" : (mins > 120 ? "Powyżej 2h" : "W środku");
      return {
        "#":                    i + 1,
        "Numer Rejestracyjny":  e.plate,
        "Nr Dokumentu":         e.docNr || "",
        "Data Wjazdu":          fmtDate(e.arrival),
        "Czas Wjazdu":          fmtTime(e.arrival),
        "Czas Wyjazdu":         e.exit || "",
        "Status":               status
      };
    });

    const ws = XLSX.utils.json_to_sheet(rows);
    ws["!cols"] = [{ wch: 5 }, { wch: 18 }, { wch: 18 }, { wch: 14 }, { wch: 12 }, { wch: 14 }, { wch: 14 }];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Rejestracja");

    const d   = new Date();
    const pad = n => String(n).padStart(2, "0");
    XLSX.writeFile(wb, `rejestracja-${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.xlsx`);
  });
</script>
</body>
</html>
